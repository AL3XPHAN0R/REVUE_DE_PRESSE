name: Daily Digest

on:
  schedule:
    - cron: '0 11 * * *'   # 07:00 EDT (UTC-4) / 08:00 EST (UTC-5)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Stage 01 — Fetch articles
        run: python stages/01_fetch/fetch.py

      - name: Stage 02 — Curate with Claude Haiku
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python stages/02_curate/curate.py

      - name: Stage 03 — Send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stages/03_send/send.py
